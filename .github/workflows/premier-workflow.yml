
name: Premier Workflow

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    name: Tests CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Run tests
        run: |
          echo "Running tests..."
          echo "Test 1: OK"
          echo "Test 2: OK"
          echo "All tests passed!"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Build app
        run: |
          mkdir -p app
          echo "<h1>My App</h1>" > app/index.html
          echo "Version: ${{ github.sha }}" > app/version.txt
          echo "Build date: $(date)" >> app/version.txt
          echo "Build complete!"
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: my-app
          path: app/

  hello:
    name: Hello Message
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Say Hello
        run: echo "Bonjour GitHub Actions!"
      - name: Download build
        uses: actions/download-artifact@v3
        with:
          name: my-app
          path: downloaded/
      - name: Show build
        run: |
          echo "Build content:"
          ls -la downloaded/
          cat downloaded/version.txt


